<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>애니메이션</title>
    <style>
        @keyframes move {
            0% {margin-left: 1500px; margin-right: 0px;}
            50% {margin-left: 0px; margin-right: 100px;}
            100% {margin-left: 1500px; margin-right: 0px;}
        }
        p {
            animation-name: move;
            animation-duration: 1s;
            animation-iteration-count: infinite;
        }

    </style>
</head>
<body>
<h3>애니메이션 응용</h3>
<hr>
<p><img src="img/question.png">
	질문 있습니다.</p>
</body>
</html>
