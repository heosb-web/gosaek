<!DOCTYPE html>
<html>
    <head>
        <title></title>
        <style>
            ul>li {
                font-size: 20px;
                font-weight: bold;
                color: white;
            }
            li:hover{
                color: black;
            }
            input:focus {
                border: 5px solid #ff0000;
                padding: 10px;
            }
            input:enabled {
                color: #00ff00;
                font-weight: bold;
            }
            input:disabled {
                color: #ff0000;
            }

        </style>
    </head>
    <body>
    
    <div>
        <ul>
            <li>희</li>
            <li>망</li>
            <li>이</li>
            <li>귀</li>
            <li>여</li>
            <li>워</li>
        </ul>
    </div>
    <div>
        <form>
            이름 : <input type="text" name="uname"/><br/>
            아이디 : <input type="text" name="uid"/><br/>
            비밀번호 : <input type="password" name="upw" value="12345" disabled="disabled"/><br/>
        </form>
    </div>
    
    </body>
</html>
