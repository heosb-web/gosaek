<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Kawaii</title>
    <style>
        input {
            color: green;
            font-size: 30px;
            font-weight: bold;
        }

        input[type = text] {
            color: orange;
            font-size: 20px;
            width: 100px;
        }

        img[src] {
            border: 5px solid aqua;
        }

    </style>
</head>
<body>

<img src = 'img/Rin1.jpg' width = "500">
<form>
    이름 : <input type = "text" name = 'user_name'> <br>
    아이디 : <input type = "text" name = 'user_id'> <br>
    비밀번호 : <input type = "password" name = 'user_pw'> <br>
    연락처 : <input type = "text" name = 'user_number1' size = '3'>-<input type = "text" name = 'user_number2' size = '4'>-<input type = "text" name = 'user_number3' size = '4'> <br>
    사진 : <input type = "file" name = 'user_img'> <br>
    성별 : <input type = "radio" name = 'user_sex' value = "m">남, <input type = "radio" name = 'user_sex' value = "f">여, <input type = "radio" name = 'user_sex' value = "m">기타 <br>
    사용언어 : <input type = 'checkbox' name = 'lan' value = 'kor' checked = 'checked'>한글, <input type = 'checkbox' name = 'lan' value = 'eng'>영어, <input type = 'checkbox' name = 'lan' value = 'jap'>일본어, <input type = 'checkbox' name = 'lan' value = 'chi'>중국어 <br>
    자기소개 : <textarea name = 'intro' rows = '5' cols = '40'></textarea> <br>
    국적 :
    <select>
        <option>Korea</option>
        <option>USA</option>
        <option>Japan</option>
        <option>China</option>
        <option>조선민주주의인민공화국</option>
    </select>

    <br>
    좋아하는 음식 :
    <select multiple = 'multiple'>
        <option>햄버거</option>
        <option>피자</option>
        <option>치킨</option>
    </select>

    <br>

    <input type = 'submit'>
</form>

    <video controls = 'controls'>
        <source src = 'video/411.mp4' type = 'video/mp4'>
    </video>

    <video src = 'video/411.mp4' type = 'video/mp4' controls = 'controls'></video>
</body>
</html>
