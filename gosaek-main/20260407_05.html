<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            position: fixed;
            display: inline-block;
            color: aqua;
            border: 2px solid black;
        }
        #red {
            background: red;
            height: 50px;
            width: 50px;
        }
        #yellow {
            position: relative;
            z-index: 1;
            background: yellow;
            height: 200px;
            width: 200px;
            left: 50px;
            top: 100px;
        }
        #green {
            z-index: 2;
            background: green;
            height: 50px;
            width: 50px;
            left: 108px;
            top: 108px;
        }
        #blue {
            z-index: 2;
            background: blue;
            height: 50px;
            width: 50px;
            left: 108px;
            top: 208px;
        }
    </style>
</head>
<body>
    <div id = "red">red</div>
    <div id = "blue">blue</div>
    <div id = "yellow">yello</div>
    <div id = "green">green</div>

</body>
</html>
