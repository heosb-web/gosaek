<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>for 문</title>
</head>
<body>
<h3>for 문으로 10px~35px 크기 출력</h3>
<hr>
<script>

	// 이곳에 자바스크립트 코드를 작성하라.
    for(let size=10; size<=35; size+=5) {
        document.write("<span ");
        document.write("style = 'font-size:" + size + "px;'>");
        document.write(size + "px");
        document.write("</span>");
    }
</script>
<!-- <span style = 'font-size: 5px;'>abc</span> -->
</body>
</html>
